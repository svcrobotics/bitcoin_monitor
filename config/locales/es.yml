          <li><strong>ratio30</strong> = inflow / media de los 30 días anteriores. <span class="text-gray-400">x1 ≈ normal • x2 = 2× normal • ∞ = baseline≈0 • 0 = sin depósitos.</span></li>
          <li><strong>Niveles</strong> = B=100–299, A=300–999, S=≥1000 BTC.</li>
        </ul>

