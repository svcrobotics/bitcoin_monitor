      title_24h: "交易所真实资金流（24小时）"
      net_badge: "净值"
      tiers: "分层"
      tiers_hint: "大额转账分层（单笔规模）：B=100–299 BTC • A=300–999 BTC • S=≥1000 BTC"

      intro_html: "基于自动识别的“交易所地址集合”的资金流：inflow / outflow / net（24小时）。<span class='text-gray-500'>自动识别集合 • 最小出现次数：<span class='font-mono'>%{min_occ}</span></span>"

      window_7: "7天"
      window_14: "14天"
      window_30: "30天"
      window_hint_html: "观察窗口 <span class='font-mono'>%{days}天</span> <span class='text-gray-700'>•</span> 周期越长越有助于识别“市场状态”"
      learn: "说明"

      learn_sections:
        structure: "指标结构"

      learn_html: >
        <ul class="mt-2 space-y-1 list-disc pl-5 text-gray-300">
          <li><strong>Inflow</strong> = 流入交易所地址集合的 BTC。<span class="text-gray-400">通常表示潜在卖出意图（充值）。</span></li>
          <li><strong>Outflow</strong> = 从交易所地址集合中流出的 BTC（观测模式）。<span class="text-gray-400">在 pruned 模式（无 txindex）下，我们跟踪流入交易所的 UTXO 存量，并在其被花费时进行识别。</span></li>
          <li><strong>Net flow</strong> = inflow − outflow。<span class="text-gray-400">为正表示净卖压 • 为负表示净提币。</span></li>
          <li><strong>ratio30</strong> = inflow / 过去30天平均值。<span class="text-gray-400">x1 ≈ 正常 • x2 = 2倍常态 • ∞ = 基准≈0 • 0 = 无充值。</span></li>
          <li><strong>分层</strong> = B=100–299，A=300–999，S=≥1000 BTC。</li>
        </ul>

