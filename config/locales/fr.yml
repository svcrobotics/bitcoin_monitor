    true_flow:
      title_24h: "True exchange flow (24h)"
      net_badge: "Net"
      tiers: "Tiers"
      tiers_hint: "Tiers dépôts whales (taille de l’événement): B=100–299 BTC • A=300–999 BTC • S=≥1000 BTC"

      intro_html: "Flux sur le set “exchange” auto-détecté : inflow / outflow / net (24h). <span class='text-gray-500'>Set auto-détecté • min occurrences: <span class='font-mono'>%{min_occ}</span></span>"

      window_7: "7j"
      window_14: "14j"
      window_30: "30j"
      window_hint_html: "Fenêtre <span class='font-mono'>%{days}j</span> <span class='text-gray-700'>•</span> plus long = mieux pour voir le “régime”"
      learn: "Comprendre"

      learn_sections:
        structure: "Structure de l’indicateur"

      learn_html: >
        <div class="text-gray-300 space-y-3">
          <p class="text-gray-200">
            Cet indicateur mesure les <strong>flux BTC sur un set d’adresses “exchange-like” auto-détecté</strong> (sur 24h) :
            <strong>Inflow</strong> (dépôts vers exchange-like), <strong>Outflow</strong> (retraits externes), et <strong>Net</strong> (pression nette).
          </p>

          <div class="bg-black/20 border border-gray-800 rounded-xl p-3">
            <p class="text-gray-200 font-semibold">1) “Exchange-like” — qu’est-ce que ça veut dire ?</p>
            <p class="text-gray-400 mt-1">
              <strong>Exchange-like</strong> = un ensemble d’adresses que notre système considère comme <strong>probablement contrôlées par des exchanges</strong>
              (hot wallets, clusters opérationnels, dépôts/collecte).
              <br/>
              On ne prétend pas identifier “Binance/OKX/Coinbase” à 100% : on construit un <strong>set</strong> basé sur des signaux (patterns)
              puis on l’utilise comme “zone exchange” pour mesurer la pression.
            </p>

            <ul class="mt-2 space-y-1 list-disc pl-5 text-gray-400">
              <li>
                Le set est <strong>auto-détecté</strong> et doit passer un seuil de stabilité
                (<span class="text-gray-300 font-mono">min occurrences</span>) pour éviter les faux positifs.
              </li>
              <li>
                Plus la fenêtre (7j/14j/30j) est longue, plus on voit si on est dans un <strong>régime</strong> stable ou une anomalie ponctuelle.
              </li>
            </ul>
          </div>

          <div class="bg-black/20 border border-gray-800 rounded-xl p-3">
            <p class="text-gray-200 font-semibold">2) Comment on calcule <span class="text-gray-100">Inflow</span> (dépôts) ?</p>
            <p class="text-gray-400 mt-1">
              <strong>Inflow</strong> = somme des BTC envoyés <strong>vers</strong> des adresses du set exchange-like sur 24h.
              <br/>
              Concrètement, on observe des transactions où une sortie (output) paie une adresse appartenant au set exchange-like.
              La valeur reçue (en BTC) est comptée comme <strong>dépôt</strong>.
            </p>

            <ul class="mt-2 space-y-1 list-disc pl-5 text-gray-400">
              <li>
                On calcule aussi une <strong>structure</strong> par taille de dépôts observés :
                <code>&lt;10</code>, <code>10–99</code>, <code>100–499</code>, <code>≥500</code> BTC.
              </li>
              <li>
                Important : Inflow mesure une <strong>arrivée vers exchange-like</strong>, pas une vente confirmée.
                Un dépôt peut précéder une vente… ou rester en attente (ou servir à autre chose).
              </li>
            </ul>
          </div>

          <div class="bg-black/20 border border-gray-800 rounded-xl p-3">
            <p class="text-gray-200 font-semibold">3) Comment on calcule <span class="text-gray-100">Outflow</span> (retraits externes) ?</p>

            <p class="text-gray-400 mt-1">
              Ici, on distingue <strong>deux choses</strong> :
              <br/>
              <strong>(A) Outflow “external”</strong> = retraits <strong>vers l’extérieur</strong> (non-exchange-like) → c’est le <strong>KPI trading</strong>.
              <br/>
              <strong>(B) Mouvements “internal/reshuffle”</strong> = réorganisation interne (hot/cold, consolidation, batching) → <strong>diagnostic</strong>, pas signal.
            </p>

            <p class="text-gray-400 mt-2">
              <strong>Pourquoi c’est compliqué ?</strong>
              Sur un nœud <em>pruned</em> (sans txindex), on ne peut pas reconstruire parfaitement tout l’historique de toutes les adresses.
              Donc on utilise un modèle <strong>observé</strong> basé sur des UTXOs.
            </p>

            <div class="mt-2 text-gray-400">
              <p class="text-gray-200 font-semibold">Méthode “observée” (UTXO tracking)</p>
              <ol class="mt-1 space-y-1 list-decimal pl-5">
                <li>
                  <strong>On construit un stock d’UTXOs déposés</strong> :
                  chaque fois qu’un dépôt arrive vers exchange-like, on enregistre l’UTXO reçu
                  (<span class="text-gray-300 font-mono">txid:vout</span>, valeur BTC, <span class="text-gray-300 font-mono">seen_day</span>).
                </li>
                <li>
                  <strong>Quand ces UTXOs sont dépensés</strong> (spend),
                  on détecte la transaction de dépense et on regarde <strong>où vont les sorties</strong> (outputs).
                </li>
                <li>
                  On classe la dépense :
                  <ul class="mt-1 space-y-1 list-disc pl-5">
                    <li>
                      <strong>external</strong> si les outputs vont majoritairement vers des adresses <strong>hors</strong> set exchange-like
                      → compté comme <strong>retrait externe</strong>.
                    </li>
                    <li>
                      <strong>internal</strong> si les outputs restent majoritairement <strong>dans</strong> le set exchange-like
                      → <strong>reshuffle</strong> (diagnostic).
                    </li>
                    <li>
                      <strong>mixed</strong> si c’est partagé (une partie externe, une partie interne).
                    </li>
                  </ul>
                </li>
                <li>
                  <strong>Outflow(external)</strong> = somme des montants classés <strong>external</strong> sur 24h.
                  C’est la valeur affichée comme “Withdrawals (external)”.
                </li>
              </ol>
            </div>

            <p class="text-gray-500 mt-2 text-[11px]">
              Note : on affiche parfois un <strong>contexte</strong> (kind/confidence/internal share/gross) pour expliquer
              “est-ce un vrai retrait, ou juste un reshuffle ?”.
            </p>
          </div>

          <div class="bg-black/20 border border-gray-800 rounded-xl p-3">
            <p class="text-gray-200 font-semibold">4) Net flow & ratio30 — comment on obtient ces valeurs ?</p>

            <ul class="mt-2 space-y-1 list-disc pl-5 text-gray-400">
              <li>
                <strong>Net</strong> = <strong>Inflow (deposits)</strong> − <strong>Outflow (external)</strong>.
                <br/>
                <span class="text-gray-500">Net &gt; 0 : dépôts nets (risque de pression vendeuse) • Net &lt; 0 : retraits nets (supportif).</span>
              </li>
              <li>
                <strong>avg30</strong> = moyenne des inflows sur les <strong>30 jours précédents</strong> (baseline).
              </li>
              <li>
                <strong>ratio30</strong> = Inflow / avg30.
                <span class="text-gray-500">x1 ≈ normal • x1.6 = watch • x2.6+ = extrême • 0 = aucun dépôt • ∞ si avg30≈0.</span>
              </li>
            </ul>
          </div>

          <div class="bg-black/20 border border-gray-800 rounded-xl p-3">
            <p class="text-gray-200 font-semibold">5) Reshuffle — définition simple</p>
            <p class="text-gray-400 mt-1">
              <strong>Reshuffle</strong> = l’exchange bouge ses propres fonds entre ses wallets (opérations internes).
              Ça peut représenter de gros volumes, mais ce n’est <strong>pas</strong> une action utilisateur “je retire mes BTC”.
              <br/>
              Donc : <strong>reshuffle ≠ signal de marché</strong>. C’est pour ça qu’on garde ces infos en contexte/diagnostic,
              séparées du KPI trading “Outflow(external)”.
            </p>
          </div>

          <div class="bg-black/20 border border-gray-800 rounded-xl p-3">
            <p class="text-gray-200 font-semibold">Lecture pro en 3 secondes</p>
            <ol class="mt-2 space-y-1 list-decimal pl-5 text-gray-400">
              <li><strong>ratio30</strong> : le régime de dépôts est-il anormal ?</li>
              <li><strong>Outflow(external)</strong> : y a-t-il des retraits externes significatifs ?</li>
              <li><strong>Net</strong> + P+1/P+2 : dépôts absorbés ou pression qui se confirme ?</li>
            </ol>
          </div>

          <p class="text-[11px] text-gray-500">
            Limites : “exchange-like” est une détection probabiliste, et l’outflow est calculé en mode observé (UTXO tracking).
            La colonne “couverture” indique quand l’échantillon est insuffisant pour conclure.
          </p>
        </div>

