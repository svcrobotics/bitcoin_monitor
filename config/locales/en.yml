      learn_sections:
        structure: "Indicator structure"

      learn_html: >
        <ul class="mt-2 space-y-1 list-disc pl-5 text-gray-300">
          <li><strong>Inflow</strong> = BTC sent to the “exchange” set. <span class="text-gray-400">Often a sell intent (deposit).</span></li>
          <li><strong>Outflow</strong> = BTC that <em>leave</em> the “exchange” set, in <em>observed</em> mode. <span class="text-gray-400">On pruned nodes (no txindex), we track a stock of UTXOs deposited to the exchange set and detect when they get spent.</span></li>
          <li><strong>Net flow</strong> = inflow − outflow. <span class="text-gray-400">Positive = net selling pressure • Negative = net withdrawals.</span></li>
          <li><strong>ratio30</strong> = inflow / average of the previous 30 days. <span class="text-gray-400">x1 ≈ normal • x2 = 2× normal • ∞ = baseline≈0 • 0 = no deposits.</span></li>
          <li><strong>Tiers</strong> = B=100–299, A=300–999, S=≥1000 BTC.</li>
        </ul>

